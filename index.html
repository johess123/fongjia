                        <button onclick="renderConsultants()" class="w-full bg-indigo-500 hover:bg-indigo-600 active:bg-indigo-700 text-white p-4 rounded-2xl shadow-md flex items-center justify-between transition-colors">
                            <div class="flex items-center text-lg font-bold">
                                ${icons.award} 大會顧問名單
                            </div>
                            <div class="bg-white/20 px-3 py-1 rounded-full text-sm font-medium">
                                共 ${CONSULTANT_LIST.length} 人
                            </div>
                        </button>

                        <!-- 會員名單按鈕 -->
                        <button onclick="renderMembers()" class="w-full bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white p-4 rounded-2xl shadow-md flex items-center justify-between transition-colors">
                            <div class="flex items-center text-lg font-bold">
                                ${icons.usersList} 大會會員名單
                            </div>
                            <div class="bg-white/20 px-3 py-1 rounded-full text-sm font-medium">
                                共 ${MEMBER_LIST.length} 人
                            </div>
                        </button>
                    </div>

                    <!-- 分組任務列表 -->
                    <div class="pt-2">
                        <h3 class="text-gray-800 font-bold text-lg mb-3 flex items-center">
                            ${icons.list} 志工分組任務
                        </h3>
                        <div class="grid grid-cols-1 gap-3">
                            ${groupsHtml}
                        </div>
                    </div>
                </div>
            `;
        };

        // 渲染組別詳細頁 
        window.renderGroup = function(groupId) {
            const group = VOLUNTEER_DATA.find(g => g.id === groupId);
            if(!group) return;

            app.innerHTML = `
                <div class="space-y-4 slide-in">
                    <button onclick="renderHome()" class="flex items-center text-red-600 font-bold mb-2 py-2 active:opacity-70 transition-opacity">
                        ${icons.chevronLeft} 返回主頁
                    </button>

                    <h2 class="text-2xl font-black text-gray-800 mb-4">${group.name}</h2>

                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                        <!-- 成員 -->
                        <div class="p-5 border-b border-gray-100 bg-gray-50/50">
                            <h3 class="font-bold text-gray-800 flex items-center mb-2 text-lg">
                                ${icons.users} 小組成員
                            </h3>
                            <p class="text-gray-700 leading-relaxed text-base">${group.members}</p>
                        </div>

                        <!-- Phase 1 -->
                        <div class="p-5 border-b border-gray-100">
                            <h3 class="font-bold text-gray-800 flex items-center mb-3 text-lg">
                                ${icons.clock} Phase 1: 迎賓 (10:30 - 12:00)
                            </h3>
                            <div class="bg-green-50/80 p-4 rounded-xl text-green-900 leading-relaxed text-base border border-green-100">
                                ${formatText(group.phase1)}
                            </div>
                        </div>

                        <!-- Phase 2 -->
                        <div class="p-5">
                            <h3 class="font-bold text-gray-800 flex items-center mb-3 text-lg">
                                ${icons.utensils} Phase 2: 午宴 (12:20 - 14:00)
                            </h3>
                            <div class="bg-orange-50/80 p-4 rounded-xl text-orange-900 leading-relaxed text-base border border-orange-100">
                                ${formatText(group.phase2)}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            window.scrollTo(0, 0);
        };

        // 渲染活動流程頁
        window.renderSchedule = function() {
            let scheduleHtml = SCHEDULE_DATA.map((item) => `
                <div class="relative pl-6 hover:bg-red-50/50 rounded-xl transition-colors p-2 -ml-2 mb-2">
                    <div class="absolute left-[1px] top-3 w-4 h-4 rounded-full bg-red-500 border-4 border-red-50 shadow-sm"></div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                        <div class="text-sm font-black text-red-600 mb-1">${item.time}</div>
                        <h3 class="text-lg font-bold text-gray-800 mb-1">${formatText(item.title)}</h3>
                        <p class="text-gray-600 text-sm leading-relaxed">${formatText(item.desc)}</p>
                    </div>
                </div>
            `).join('');

            app.innerHTML = `
                <div class="space-y-4 slide-in">
                    <button onclick="renderHome()" class="flex items-center text-red-600 font-bold mb-2 py-2 active:opacity-70 transition-opacity">
                        ${icons.chevronLeft} 返回主頁
                    </button>

                    <h2 class="text-2xl font-black text-gray-800 mb-6 flex items-center">
                        <svg class="w-6 h-6 mr-2 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        大會詳細流程表
                    </h2>

                    <div class="relative border-l-2 border-red-200 ml-3 md:ml-4 pb-8 mt-4">
                        ${scheduleHtml}
                    </div>
                </div>
            `;
            window.scrollTo(0, 0);
        };

        // 渲染會員名單頁
        window.renderMembers = function() {
            let membersHtml = MEMBER_LIST.map((name, index) => `
                <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex items-center">
                    <div class="w-8 h-8 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center font-bold text-sm mr-3 shrink-0">
                        ${index + 1}
                    </div>
                    <div class="font-bold text-gray-700 text-sm sm:text-base">${name}</div>
                </div>
            `).join('');

            app.innerHTML = `
                <div class="space-y-4 slide-in">
                    <button onclick="renderHome()" class="flex items-center text-red-600 font-bold mb-2 py-2 active:opacity-70 transition-opacity">
                        ${icons.chevronLeft} 返回主頁
                    </button>

                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-black text-gray-800 flex items-center">
                            <svg class="w-6 h-6 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                            大會會員名單
                        </h2>
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1.5 rounded-full">共 ${MEMBER_LIST.length} 人</span>
                    </div>

                    <div class="grid grid-cols-2 gap-3 pb-8">
                        ${membersHtml}
                    </div>
                </div>
            `;
            window.scrollTo(0, 0);
        };

        // 渲染顧問名單頁
        window.renderConsultants = function() {
            let consultantsHtml = CONSULTANT_LIST.map((name, index) => `
                <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex items-center">
                    <div class="w-8 h-8 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center font-bold text-sm mr-3 shrink-0">
                        ${index + 1}
                    </div>
                    <div class="font-bold text-gray-700 text-sm sm:text-base">${name}</div>
                </div>
            `).join('');

            app.innerHTML = `
                <div class="space-y-4 slide-in">
                    <button onclick="renderHome()" class="flex items-center text-red-600 font-bold mb-2 py-2 active:opacity-70 transition-opacity">
                        ${icons.chevronLeft} 返回主頁
                    </button>

                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-black text-gray-800 flex items-center">
                            <svg class="w-6 h-6 mr-2 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
                            大會顧問名單
                        </h2>
                        <span class="bg-indigo-100 text-indigo-800 text-xs font-bold px-3 py-1.5 rounded-full">共 ${CONSULTANT_LIST.length} 人</span>
                    </div>

                    <div class="grid grid-cols-2 gap-3 pb-8">
                        ${consultantsHtml}
                    </div>
                </div>
            `;
            window.scrollTo(0, 0);
        };

        // 啟動應用程式
        renderHome();
    </script>
</body>
</html>
